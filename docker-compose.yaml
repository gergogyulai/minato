services:
  minato:
    image: gergogyulai/minato:dev
    container_name: minato
    restart: unless-stopped
    ports:
      - "7271:7271"
    networks:
      - internal-minato
    environment:
      - NODE_ENV=production
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DATABASE_URL=postgresql://minato_user:minato_password@postgres:5432/minato
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - minato_assets:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    container_name: minato-db
    restart: unless-stopped
    networks:
      - internal-minato
    environment:
      - POSTGRES_DB=minato
      - POSTGRES_USER=minato_user
      - POSTGRES_PASSWORD=minato_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minato_user -d minato"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minato-redis
    restart: unless-stopped
    networks:
      - internal-minato
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: minato-search
    restart: unless-stopped
    networks:
      - internal-minato
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data

networks:
  internal-minato:
    driver: bridge

volumes:
  minato_assets:
  postgres_data:
  redis_data:
  meilisearch_data:
