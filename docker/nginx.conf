upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 7271;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API requests to the Hono backend (bun, port 3000)
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # Vite bundles land in /usr/share/nginx/html/assets/ — serve them from disk.
    # Only fall through to the backend for media files that don't exist on disk
    # (served by Hono serveStatic from MEDIA_ROOT).
    location /assets/ {
        try_files $uri @backend_assets;
    }

    location @backend_assets {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
